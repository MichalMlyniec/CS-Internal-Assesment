<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In – Teacher</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 300px;
            border: 2px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        .card-header {
            background: #4dc9d6;
            padding: 24px 0;
            text-align: center;
        }

        .card-header h1 {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
        }

        .card-body {
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 20px;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus { border-color: #4dc9d6; }

        .flash {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            text-align: center;
        }
        .flash.error   { background: #fde8e8; color: #c0392b; }
        .flash.success { background: #e8fde8; color: #27ae60; }

        .btn-submit {
            background: #4dc9d6;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 10px;
            font-size: 1rem;
            cursor: pointer;
            width: 60%;
            align-self: center;
        }
        .btn-submit:hover { background: #38b2bd; }

        .divider {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #aaa;
            font-size: 0.8rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .btn-secondary {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding: 9px;
            font-size: 0.9rem;
            cursor: pointer;
            width: 70%;
            align-self: center;
            text-align: center;
            text-decoration: none;
            color: #333;
            display: block;
        }
        .btn-secondary:hover { background: #f5f5f5; }
    </style>
</head>
<body>

<div class="card">

    <div class="card-header">
        <h1>Log in</h1>
    </div>

    <div class="card-body">

        {% for category, message in get_flashed_messages(with_categories=True) %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}

        <!--
            POST to /login.
            On success the server sets the session and redirects to /dashboard.
            On failure it flashes an error and re-renders this page.
        -->
        <form method="POST" action="/login">

            <div style="display:flex; flex-direction:column; gap:12px;">
                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required
                    autocomplete="username"
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                    autocomplete="current-password"
                >

                <button type="submit" class="btn-submit">Submit</button>
            </div>

        </form>

        <div class="divider">or</div>

        <!-- Teachers who don't have an account yet can go to signup -->
        <a href="/signup" class="btn-secondary">Sign up</a>

    </div>
</div>

</body>
</html>
