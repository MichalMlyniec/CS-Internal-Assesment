<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Class</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 16px;
        }

        .card {
            width: 320px;
            border: 2px solid #b0b0b0;
            border-radius: 6px;
            background: #fff;
            overflow: hidden;
        }

        .card-header {
            background: #4dc9d6;
            padding: 18px 0;
            text-align: center;
        }

        .card-header h1 {
            font-size: 1.55rem;
            font-weight: bold;
            color: #fff;
        }

        .card-body {
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .section-label {
            font-weight: bold;
            font-size: 0.92rem;
            color: #111;
            margin-bottom: 8px;
        }

        .pill-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pill-radio { display: none; }

        .pill-label {
            border: 1px solid #b0b0b0;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            background: #fff;
            color: #222;
        }

        .pill-radio:checked + .pill-label {
            background: #4dc9d6;
            color: #fff;
            border-color: #4dc9d6;
        }

        input[type="text"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #b0b0b0;
            border-radius: 4px;
            font-size: 0.92rem;
            outline: none;
        }

        input[type="text"]:focus { border-color: #4dc9d6; }

        .btn-create {
            background: #4dc9d6;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 10px;
            font-size: 1rem;
            cursor: pointer;
            width: 60%;
            align-self: center;
        }

        .btn-create:hover { background: #38b2bd; }

        .flash {
            padding: 7px 10px;
            border-radius: 5px;
            font-size: 0.83rem;
            text-align: center;
        }
        .flash.error   { background: #fde8e8; color: #c0392b; }
        .flash.success { background: #e8fde8; color: #27ae60; }

        .back-link {
            font-size: 0.8rem;
            color: #888;
            text-decoration: none;
            text-align: center;
        }
        .back-link:hover { color: #333; }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <h1>Create Class</h1>
    </div>
    <div class="card-body">

        {% for category, message in get_flashed_messages(with_categories=True) %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}

        <form method="POST" action="/create_class" style="display:flex; flex-direction:column; gap:14px;">

            <div>
                <p class="section-label">Select Year:</p>
                <div class="pill-row">
                    {% for y in years %}
                        <input
                            type="radio"
                            name="year_id"
                            id="year_{{ loop.index }}"
                            value="{{ y }}"
                            class="pill-radio"
                            {% if y == current %}checked{% endif %}
                        >
                        <label for="year_{{ loop.index }}" class="pill-label">{{ y }}</label>
                    {% endfor %}
                </div>
            </div>

            <div>
                <p class="section-label">Name of the Class:</p>
                <input type="text" name="class_name" placeholder="Type name" required>
            </div>

            <button type="submit" class="btn-create">Create</button>

        </form>

        <a href="/dashboard" class="back-link">← Back to dashboard</a>

    </div>
</div>

</body>
</html>
