<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – Teacher</title>
    <style>
        /* ---- page reset & background ---- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ---- card container ---- */
        .card {
            width: 300px;
            border: 2px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        /* ---- teal header strip, matching the GUI wireframe ---- */
        .card-header {
            background: #4dc9d6;
            padding: 24px 0;
            text-align: center;
        }

        .card-header h1 {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
        }

        /* ---- form body ---- */
        .card-body {
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 20px;   /* pill shape from the wireframe */
            font-size: 0.95rem;
            outline: none;
        }

        input:focus { border-color: #4dc9d6; }

        /* ---- flash messages ---- */
        /* Flask's flash() sends messages to the template; we display them here */
        .flash {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            text-align: center;
        }
        .flash.error   { background: #fde8e8; color: #c0392b; }
        .flash.success { background: #e8fde8; color: #27ae60; }

        /* ---- primary submit button ---- */
        .btn-submit {
            background: #4dc9d6;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 10px;
            font-size: 1rem;
            cursor: pointer;
            width: 60%;
            align-self: center;
        }
        .btn-submit:hover { background: #38b2bd; }

        /* ---- divider line ---- */
        .divider {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #aaa;
            font-size: 0.8rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        /* ---- secondary link button (go to login) ---- */
        .btn-secondary {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding: 9px;
            font-size: 0.9rem;
            cursor: pointer;
            width: 70%;
            align-self: center;
            text-align: center;
            text-decoration: none;
            color: #333;
            display: block;
        }
        .btn-secondary:hover { background: #f5f5f5; }
    </style>
</head>
<body>

<div class="card">

    <!-- Header strip -->
    <div class="card-header">
        <h1>Sign up</h1>
    </div>

    <!-- Form body -->
    <div class="card-body">

        <!--
            Flash messages: Flask's flash() puts messages in a special list.
            get_flashed_messages(with_categories=True) returns pairs of
            (category, message) so we can style errors differently to successes.
        -->
        {% for category, message in get_flashed_messages(with_categories=True) %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}

        <!--
            The form sends a POST request to /signup.
            method="POST" means the data goes in the request body (not the URL).
        -->
        <form method="POST" action="/signup">

            <!-- Username field -->
            <div style="display:flex; flex-direction:column; gap:12px;">
                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required
                    autocomplete="username"
                >

                <!-- Password field — type="password" hides the typed characters -->
                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                    autocomplete="new-password"
                >

                <!--
                    Confirm password field — the user must type the password twice.
                    The server (in Main.py) checks that both values match.
                -->
                <input
                    type="password"
                    name="confirm_password"
                    placeholder="Confirm Password"
                    required
                    autocomplete="new-password"
                >

                <button type="submit" class="btn-submit">Submit</button>
            </div>

        </form>

        <div class="divider">or</div>

        <!-- Link to the login page for teachers who already have an account -->
        <a href="/login" class="btn-secondary">Log in</a>

    </div>
</div>

</body>
</html>
